<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tressette a Perdere - Pino Narciso</title>
    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --warning: #f39c12; --success: #27ae60; --accent: #3498db; --info: #34b7f1; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 15px; box-sizing: border-box; }
        h1 { text-align: center; color: var(--primary); font-size: 1.3rem; margin-top: 0; }
        label { font-size: 0.8rem; font-weight: bold; color: var(--primary); }
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px; color: white; transition: background 0.3s; }
        
        #confirm-btn { background: var(--danger); }
        #confirm-btn.ready { background: var(--success); }
        #confirm-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-main { background: var(--success); }
        .btn-cap { background: var(--warning); width: auto; padding: 4px 8px; margin: 0; font-size: 0.7rem; }
        .btn-rete { background: var(--info); width: auto; padding: 4px 8px; margin: 0; font-size: 0.7rem; }
        .btn-undo { background: #95a5a6; }
        .btn-share { background: var(--accent); }
        
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .sum-check { font-weight: bold; text-align: center; padding: 8px; border-radius: 6px; margin: 10px 0; }
        .sum-ok { background: #e8f5e9; color: var(--success); }
        .sum-err { background: #ffebee; color: var(--danger); }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 10px; }
        th, td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #eee; overflow: hidden; font-size: 0.8rem; color: #333;}
        th:nth-child(1), td:nth-child(1) { width: 30px; }
        th:nth-child(2), td:nth-child(2) { width: 80px; text-align: left; }
        th:nth-child(3), td:nth-child(3) { width: 45px; }
        
        .history-scroll-cell { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .history-scroll-cell::-webkit-scrollbar { display: none; }
        .badge-container { display: flex; flex-direction: column; align-items: center; min-width: 22px; }
        .hand-num { font-size: 0.6rem; color: #999; margin-bottom: 2px; font-weight: bold; }
        .badge { background: #f1f3f5; padding: 2px 5px; border-radius: 4px; font-size: 0.75rem; border: 1px solid #e9ecef; min-width: 15px; text-align: center; color: #333; }
        .badge.high { color: var(--danger); font-weight: bold; }
        .badge.zero { color: var(--success); font-weight: bold; }
        
        .eliminated { background: #fdf2f2; color: #adb5bd; }
        .eliminated td { text-decoration: line-through; }
        .warning { background: #fff9eb; }
        .leader { background: #f0fff4; }
        .hidden { display: none; }
        footer { font-size: 0.7rem; text-align: center; color: #7f8c8d; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h1>Nuovo Tavolo</h1>
        <label>Nome Tavolo</label>
        <input type="text" id="tableName" value="Tavolo 1">
        <label>Punti Limite</label>
        <input type="number" id="limit" value="81" inputmode="numeric">
        <label>Nomi Giocatori (separati da virgola)</label>
        <input id="names" placeholder="Mario, Luca, Anna">
        <button class="btn-main" onclick="start()">Inizia Partita</button>
    </div>

    <div class="card hidden" id="game">
        <h1 id="displayTableName">Tavolo 1</h1>
        <div id="inputs-area"></div>
        <div id="sum-display" class="sum-check sum-err">Somma: 0 / 21</div>
        <button id="confirm-btn" onclick="addRound()" disabled>Conferma Mano</button>

        <h3>Classifica e Storico</h3>
        <table>
            <thead>
                <tr><th>#</th><th>Nome</th><th>Pt</th><th>Storico (←)</th></tr>
            </thead>
            <tbody id="ranking-body"></tbody>
        </table>

        <div style="margin-top: 15px;">
            <button class="btn-share" onclick="shareResults()">📤 Condividi Risultati</button>
            <button class="btn-undo" onclick="undoLast()">↩️ Annulla Ultima Mano</button>
            <button style="background: #eee; color: #333; font-size: 0.8rem;" onclick="resetGame()">🔄 Nuova Partita</button>
        </div>
    </div>

    <footer>
        &copy; 2026 - Tutti i diritti riservati<br>
        Sviluppato da <strong>Pino Narciso</strong>
    </footer>

<script>
    let players = [];
    let history = [];
    let limit = 81;
    let currentTableName = "Tavolo 1";

    window.onload = () => {
        // Carica i nomi dei giocatori salvati per comodità
        const savedNames = localStorage.getItem('tressette_last_names');
        if (savedNames) {
            document.getElementById('names').value = savedNames;
        }

        // Carica lo stato della partita corrente se esiste
        const saved = localStorage.getItem('tressette_save');
        if (saved) {
            const data = JSON.parse(saved);
            players = data.players;
            history = data.history;
            limit = data.limit;
            currentTableName = data.tableName || "Tavolo 1";
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('displayTableName').innerText = currentTableName;
            render();
        }
    };

    function save() {
        localStorage.setItem('tressette_save', JSON.stringify({ players, history, limit, tableName: currentTableName }));
    }

    function resetGame() {
        if(confirm('Vuoi cancellare la partita corrente?')) {
            localStorage.removeItem('tressette_save');
            location.reload();
        }
    }

    function start() {
        const namesRaw = document.getElementById('names').value;
        const names = namesRaw.split(',').map(n => n.trim()).filter(n => n);
        
        if (names.length < 2) return alert('Inserisci almeno 2 nomi');
        
        // Salva i nomi per la prossima volta
        localStorage.setItem('tressette_last_names', namesRaw);
        
        limit = parseInt(document.getElementById('limit').value) || 81;
        currentTableName = document.getElementById('tableName').value || "Tavolo 1";
        players = names.map((n, i) => ({ id: i, name: n, score: 0, active: true, playerHistory: [] }));
        
        document.getElementById('displayTableName').innerText = currentTableName;
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        save();
        render();
    }

    function render() {
        const inputDiv = document.getElementById('inputs-area');
        inputDiv.innerHTML = '';
        players.filter(p => p.active).forEach(p => {
            const row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `
                <span>${p.name}</span>
                <div style="display:flex; gap:5px; align-items:center;">
                    <input type="number" inputmode="numeric" class="score-in" data-id="${p.id}" 
                            style="width:50px; margin:0;" oninput="checkSum()" onclick="this.select()">
                    <button class="btn-rete" onclick="fillRete(${p.id})">RETE</button>
                    <button class="btn-cap" onclick="makeCappotto(${p.id})">CAP</button>
                </div>`;
            inputDiv.appendChild(row);
        });
        renderRanking();
        checkSum();
    }

    function fillRete(targetId) {
        let currentTotal = 0;
        let targetInput = null;
        document.querySelectorAll('.score-in').forEach(inp => {
            if (parseInt(inp.dataset.id) === targetId) { targetInput = inp; }
            else { currentTotal += parseInt(inp.value || 0); }
        });
        const diff = 21 - currentTotal;
        if (targetInput) { targetInput.value = diff < 0 ? 0 : diff; checkSum(); }
    }

    function checkSum() {
        let sum = 0;
        document.querySelectorAll('.score-in').forEach(i => sum += parseInt(i.value || 0));
        const display = document.getElementById('sum-display');
        const btn = document.getElementById('confirm-btn');
        
        display.innerText = `Somma: ${sum} / 21`;
        
        if(sum === 21) {
            btn.disabled = false;
            btn.classList.add('ready');
            display.className = 'sum-check sum-ok';
        } else {
            btn.disabled = true;
            btn.classList.remove('ready');
            display.className = 'sum-check sum-err';
        }
    }

    function addRound() {
        const snapshot = {};
        document.querySelectorAll('.score-in').forEach(inp => {
            const id = inp.dataset.id;
            const val = parseInt(inp.value || 0);
            const p = players.find(pl => pl.id == id);
            snapshot[id] = { prevScore: p.score, prevActive: p.active };
            p.score += val;
            p.playerHistory.push(val);
        });
        checkEliminations();
        history.push({ snapshot });
        save();
        render();
        
        // AUTO-FOCUS sul primo input disponibile
        const firstInput = document.querySelector('.score-in');
        if (firstInput) firstInput.focus();
    }

    function makeCappotto(winnerId) {
        if (!confirm('Confermi Cappotto?')) return;
        const snapshot = {};
        players.forEach(p => {
            if (p.active) {
                snapshot[p.id] = { prevScore: p.score, prevActive: p.active };
                const pts = (p.id == winnerId) ? 0 : 21;
                p.score += pts;
                p.playerHistory.push(pts);
            }
        });
        checkEliminations();
        history.push({ snapshot });
        save();
        render();
    }

    function checkEliminations() {
        players.forEach(p => { if (p.score >= limit) p.active = false; });
    }

    function undoLast() {
        if (!history.length) return;
        const last = history.pop();
        for (let id in last.snapshot) {
            const p = players.find(pl => pl.id == id);
            p.score = last.snapshot[id].prevScore;
            p.active = last.snapshot[id].prevActive;
            p.playerHistory.pop();
        }
        save();
        render();
    }

    function renderRanking() {
        const rank = document.getElementById('ranking-body');
        rank.innerHTML = '';
        const sorted = [...players].sort((a, b) => a.score - b.score);
        
        sorted.forEach((p, i) => {
            let cls = !p.active ? 'eliminated' : (p.score >= limit - 10 ? 'warning' : (i === 0 ? 'leader' : ''));
            
            // COLORI DINAMICI SCORE
            const ratio = p.score / limit;
            let scoreColor = '#27ae60';
            if (ratio >= 0.9) scoreColor = '#e74c3c';
            else if (ratio >= 0.7) scoreColor = '#f39c12';
            
            const scoreStyle = p.active ? `style="color: ${scoreColor}; font-weight: bold;"` : '';

            const badges = p.playerHistory.map((pt, idx) => {
                const badgeCls = pt === 21 ? 'high' : (pt === 0 ? 'zero' : '');
                return `<div class="badge-container"><span class="hand-num">${idx + 1}</span><span class="badge ${badgeCls}">${pt}</span></div>`;
            }).join('');

            rank.innerHTML += `
                <tr class="${cls}">
                    <td>${i+1}</td>
                    <td>${p.name} ${p.active ? '' : '💀'}</td>
                    <td><span ${scoreStyle}>${p.score}</span></td>
                    <td><div class="history-scroll-cell">${badges || '-'}</div></td>
                </tr>`;
        });
    }

    function shareResults() {
        let text = `🏆 TRESSETTE A PERDERE - ${currentTableName.toUpperCase()}\nLimite: ${limit} pt\n\n📊 CLASSIFICA:\n`;
        const sorted = [...players].sort((a, b) => a.score - b.score);
        sorted.forEach((p, i) => { text += `${i + 1}. ${p.name}: ${p.score} pt ${p.active ? '' : '💀'}\n`; });
        text += `\n📝 STORICO:\n`;
        players.forEach(p => { text += `• ${p.name}: [${p.playerHistory.join(', ') || '-'}]\n`; });
        if (navigator.share) { navigator.share({ title: 'Risultati Tressette', text: text }); }
        else { navigator.clipboard.writeText(text); alert('Risultati copiati negli appunti!'); }
    }
</script>
</body>
</html>
