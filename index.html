<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tressette Cloud - Pino Narciso</title>
    
    <!-- 1. LIBRERIE CLASSICHE (NON MODULI) - CARICATE DA CDNJS PER BYPASSARE CORS -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --warning: #f39c12; --success: #27ae60; --accent: #3498db; --info: #34b7f1; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 15px; box-sizing: border-box; }
        h1 { text-align: center; color: var(--primary); font-size: 1.3rem; margin-top: 0; }
        label { font-size: 0.8rem; font-weight: bold; color: var(--primary); }
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px; color: white; transition: background 0.3s; }
        .btn-main { background: var(--success); }
        .btn-join { background: var(--accent); }
        .btn-rete { background: var(--info); width: auto; padding: 4px 8px; font-size: 0.7rem; }
        .table-code { background: #eee; padding: 10px; border-radius: 6px; text-align: center; font-family: monospace; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; border: 2px dashed #ccc; }
        .sum-check { font-weight: bold; text-align: center; padding: 8px; border-radius: 6px; margin: 10px 0; }
        .sum-ok { background: #e8f5e9; color: var(--success); }
        .sum-err { background: #ffebee; color: var(--danger); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 10px; }
        th, td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #eee; font-size: 0.8rem; }
        .history-scroll-cell { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; }
        .badge { background: #f1f3f5; padding: 2px 5px; border-radius: 4px; font-size: 0.75rem; border: 1px solid #e9ecef; min-width: 15px; }
        .hidden { display: none; }
        .eliminated { background: #fdf2f2; color: #adb5bd; text-decoration: line-through; }
        footer { font-size: 0.7rem; text-align: center; color: #7f8c8d; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h1>Tressette Cloud</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn-main" onclick="showCreate()">Crea Tavolo</button>
            <button class="btn-join" onclick="showJoin()">Entra in Tavolo</button>
        </div>

        <div id="create-area" class="hidden">
            <hr><label>Nome Tavolo</label>
            <input type="text" id="tableName" value="Tavolo 1">
            <label>Limite Punti</label>
            <input type="number" id="limit" value="81">
            <label>Giocatori (separati da virgola)</label>
            <input id="names" placeholder="es: Mario, Luca, Anna">
            <button class="btn-main" onclick="createNewTable()">Avvia come Capotavola</button>
        </div>

        <div id="join-area" class="hidden">
            <hr><label>Codice Tavolo (es: TAV-1234)</label>
            <input type="text" id="joinCode" placeholder="Inserisci codice...">
            <button class="btn-join" onclick="joinTable()">Entra come Spettatore</button>
        </div>
    </div>

    <div class="card hidden" id="game">
        <div id="tableCodeDisplay" class="table-code">CODICE: ---</div>
        <h1 id="displayTableName">Tavolo</h1>
        <div id="admin-controls" class="hidden">
            <div id="inputs-area"></div>
            <div id="sum-display" class="sum-check sum-err">Somma: 0 / 21</div>
            <button id="confirm-btn" style="background:var(--success)" onclick="addRound()" disabled>Conferma Mano</button>
        </div>
        <div id="viewer-msg" class="hidden" style="text-align:center; color: var(--accent); margin-bottom:10px;">👀 Live</div>
        <table>
            <thead><tr><th>#</th><th>Nome</th><th>Pt</th><th>Storico</th></tr></thead>
            <tbody id="ranking-body"></tbody>
        </table>
        <div id="admin-footer" class="hidden" style="margin-top: 15px;">
            <button style="background:#95a5a6; width:100%" onclick="undoLast()">↩️ Annulla Ultima Mano</button>
        </div>
        <button style="background: #eee; color: #333; font-size: 0.8rem; margin-top:10px" onclick="location.reload()">🔄 Torna al Menu</button>
    </div>

    <footer>Sviluppato da <strong>Pino Narciso</strong></footer>

<script>
    // CHIAVI FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAeZiPDG89tRz3QeFBhh3wWLkGtjoFGiXA",
        authDomain: "campinato-tresette-a-perdere.firebaseapp.com",
        databaseURL: "https://campinato-tresette-a-perdere-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "campinato-tresette-a-perdere",
        storageBucket: "campinato-tresette-a-perdere.firebasestorage.app",
        messagingSenderId: "105475040052",
        appId: "1:105475040052:web:631c46b7d47cd8b333bb61"
    };

    let db;
    let currentTableID = null;
    let isAdmin = false;
    let gameData = { players: [], limit: 81 };

    // INIZIALIZZAZIONE SENZA MODULI
    window.onload = function() {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            console.log("✅ CLOUD PRONTO");
        } else {
            alert("Errore caricamento. Controlla la connessione internet.");
        }
    };

    function showCreate() { document.getElementById('create-area').classList.toggle('hidden'); document.getElementById('join-area').classList.add('hidden'); }
    function showJoin() { document.getElementById('join-area').classList.toggle('hidden'); document.getElementById('create-area').classList.add('hidden'); }

    function createNewTable() {
        if (!db) return;
        const names = document.getElementById('names').value.split(',').map(n => n.trim()).filter(n => n);
        if (names.length < 2) return alert('Minimo 2 giocatori');
        isAdmin = true;
        currentTableID = "TAV-" + Math.floor(1000 + Math.random() * 9000);
        gameData = {
            tableName: document.getElementById('tableName').value || "Tavolo",
            limit: parseInt(document.getElementById('limit').value) || 81,
            players: names.map((n, i) => ({ id: i, name: n, score: 0, active: true, playerHistory: [] }))
        };
        db.ref('tables/' + currentTableID).set(gameData).then(startListening);
    }

    function joinTable() {
        const code = document.getElementById('joinCode').value.toUpperCase().trim();
        if (!code) return alert("Inserisci codice!");
        currentTableID = code;
        isAdmin = false;
        startListening();
    }

    function startListening() {
        db.ref('tables/' + currentTableID).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return alert("Codice errato!");
            gameData = data;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('tableCodeDisplay').innerText = `CODICE: ${currentTableID}`;
            document.getElementById('displayTableName').innerText = gameData.tableName;
            
            if (isAdmin) {
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('admin-footer').classList.remove('hidden');
            } else {
                document.getElementById('viewer-msg').classList.remove('hidden');
            }
            render();
        });
    }

    function render() {
        const rank = document.getElementById('ranking-body');
        rank.innerHTML = '';
        const sorted = [...gameData.players].sort((a, b) => a.score - b.score);
        sorted.forEach((p, i) => {
            const ratio = p.score / gameData.limit;
            const color = ratio >= 0.9 ? '#e74c3c' : (ratio >= 0.7 ? '#f39c12' : '#27ae60');
            const badges = (p.playerHistory || []).map(pt => `<span class="badge">${pt}</span>`).join('');
            rank.innerHTML += `<tr class="${!p.active ? 'eliminated' : ''}"><td>${i+1}</td><td>${p.name}</td><td style="color:${color}; font-weight:bold">${p.score}</td><td><div class="history-scroll-cell">${badges}</div></td></tr>`;
        });

        if (isAdmin) {
            const inputDiv = document.getElementById('inputs-area');
            inputDiv.innerHTML = '';
            gameData.players.filter(p => p.active).forEach(p => {
                inputDiv.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>${p.name}</span>
                    <div style="display:flex; gap:5px; align-items:center;">
                        <input type="number" class="score-in" data-id="${p.id}" style="width:50px; margin:0;" oninput="checkSum()" onclick="this.select()">
                        <button class="btn-rete" onclick="fillRete(${p.id})">RETE</button>
                    </div></div>`;
            });
            checkSum();
        }
    }

    function checkSum() {
        let sum = 0;
        document.querySelectorAll('.score-in').forEach(i => sum += parseInt(i.value || 0));
        const btn = document.getElementById('confirm-btn');
        const display = document.getElementById('sum-display');
        if(display) {
            display.innerText = `Somma: ${sum} / 21`;
            display.className = `sum-check ${sum === 21 ? 'sum-ok' : 'sum-err'}`;
        }
        if(btn) btn.disabled = (sum !== 21);
    }

    function fillRete(id) {
        let currentTotal = 0;
        document.querySelectorAll('.score-in').forEach(inp => { if (parseInt(inp.dataset.id) !== id) currentTotal += parseInt(inp.value || 0); });
        const target = document.querySelector(`.score-in[data-id="${id}"]`);
        if(target) { target.value = Math.max(0, 21 - currentTotal); checkSum(); }
    }

    function addRound() {
        gameData.players.forEach(p => {
            const inp = document.querySelector(`.score-in[data-id="${p.id}"]`);
            if (inp) {
                const val = parseInt(inp.value || 0);
                if (!p.playerHistory) p.playerHistory = [];
                p.score += val;
                p.playerHistory.push(val);
                if (p.score >= gameData.limit) p.active = false;
            }
        });
        db.ref('tables/' + currentTableID).update(gameData);
    }

    function undoLast() {
        if(!confirm("Annullare l'ultima mano?")) return;
        gameData.players.forEach(p => {
            if (p.playerHistory && p.playerHistory.length) {
                const val = p.playerHistory.pop();
                p.score -= val;
                p.active = p.score < gameData.limit;
            }
        });
        db.ref('tables/' + currentTableID).update(gameData);
    }
</script>
</body>
</html>
