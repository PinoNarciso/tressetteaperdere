<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tavoli Tressette</title>
<style>
body{font-family:Segoe UI;background:#f0f2f5;padding:20px;display:flex;flex-direction:column;align-items:center;}
.card{background:white;padding:20px;border-radius:10px;width:420px;margin-bottom:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
input{width:100%;padding:8px;margin-bottom:6px;}
button{width:100%;padding:10px;background:#3498db;border:none;color:white;border-radius:6px;cursor:pointer;}
</style>
</head>
<body>

<h2>Tavoli disponibili</h2>
<div id="tables"></div>

<script>
function loadTables(){
  const tables=JSON.parse(localStorage.getItem("tables")||"[]");
  const div=document.getElementById("tables");
  div.innerHTML="";
  tables.forEach((t,i)=>{
    div.innerHTML+=`
      <div class="card">
      <b>${t.name}</b><br>
      Giocatori: ${t.players}<br>
      <input id="p_${i}" type="password" placeholder="Password tavolo">
      <button onclick="enterTable(${i})">Entra</button>
      </div>
    `;
  });
}

function enterTable(i){
  const tables=JSON.parse(localStorage.getItem("tables")||"[]");
  const table=tables[i];
  const pass=document.getElementById("p_"+i).value;
  if(pass!==table.password){ alert("Password errata"); return; }

  // se editor non è assegnato, diventa il primo
  if(!table.editor){ table.editor=true; localStorage.setItem("role","editor"); }
  else localStorage.setItem("role","viewer");

  // salva tavolo corrente in localStorage
  localStorage.setItem("currentTable",JSON.stringify(table));
  localStorage.setItem("tableIndex",i);

  location.href="gioco.html"; // apre il gioco
}

loadTables();
</script>

</body>
</html>
