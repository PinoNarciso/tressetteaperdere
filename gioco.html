
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tavolo Tressette</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

</head>

<body>

<div class="card">

<h2 id="tableName">Tavolo</h2>

<div id="players"></div>

<input id="points" type="number" placeholder="Punti">

<button onclick="addPoints()">Aggiungi punti</button>

</div>

<script>

const params=new URLSearchParams(location.search)
const tableID=params.get("table") || localStorage.getItem("tableID")

localStorage.setItem("tableID",tableID)

let tableData

db.ref("tables/"+tableID).on("value",snap=>{

tableData=snap.val()

if(!tableData) return

document.getElementById("tableName").innerText=tableData.name

})

function addPoints(){

const pts=parseInt(document.getElementById("points").value || 0)

db.ref("tables/"+tableID+"/backup").set({

points:pts,
date:new Date().toISOString()

})

alert("Punteggio salvato (backup automatico)")

}

</script>

</body>
</html>
