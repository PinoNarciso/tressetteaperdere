
<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<title>Tavolo di gioco</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

</head>

<body>

<div class="card">

<h2 id="tableName"></h2>

<div id="players"></div>

<input id="points" type="number" placeholder="Punti">

<button id="addBtn" onclick="addPoints()">Inserisci punteggio</button>

</div>

<script>

const tableID=localStorage.getItem("tableID")

let table
let role="viewer"

db.ref("tables/"+tableID).on("value",snap=>{

table=snap.val()

if(!table) return

document.getElementById("tableName").innerText=table.name

loadPlayers()

if(table.editor){
role="viewer"
document.getElementById("addBtn").classList.add("viewer")
}

})

function loadPlayers(){

const div=document.getElementById("players")

const players=table.players.split(",")

div.innerHTML="<b>Giocatori</b><br>"+players.join("<br>")

}

function requestPassword(){

const pass=prompt("Inserisci password tavolo")

if(pass===table.password){

db.ref("tables/"+tableID+"/editor").set(true)

role="editor"

alert("Ora puoi inserire i punteggi")

}else{

alert("Password errata")

}

}

function addPoints(){

if(role!=="editor"){

if(!table.editor){

requestPassword()

}else{

alert("Solo un giocatore può inserire i punteggi")

}

return

}

const pts=parseInt(document.getElementById("points").value||0)

db.ref("tables/"+tableID+"/game").set({

points:pts,
date:new Date().toISOString()

})

alert("Punteggio salvato")

}

</script>

</body>
</html>
