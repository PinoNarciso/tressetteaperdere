
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Tavoli</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

</head>

<body>

<div class="card">

<h2>Crea Tavolo</h2>

<input id="name" placeholder="Nome tavolo">
<input id="players" placeholder="Mario,Luca,Anna">
<input id="limit" type="number" value="81">
<input id="winners" type="number" value="3">
<input id="password" placeholder="Password tavolo">

<button onclick="createTable()">Crea Tavolo</button>

</div>

<div class="card">

<h3>Tavoli creati</h3>
<div id="tables"></div>

</div>

<script>

function createTable(){

const id="table_"+Date.now()

db.ref("tables/"+id).set({

name:document.getElementById("name").value,
players:document.getElementById("players").value,
limit:Number(document.getElementById("limit").value),
winners:Number(document.getElementById("winners").value),
password:document.getElementById("password").value,
editor:null,
game:null

})

alert("Tavolo creato")

}

db.ref("tables").on("value",snap=>{

const tables=snap.val()||{}

const div=document.getElementById("tables")

div.innerHTML=""

for(let id in tables){

const t=tables[id]

div.innerHTML+=`
<div class="table">
<b>${t.name}</b><br>
Giocatori: ${t.players}
</div>
`

}

})

</script>

</body>
</html>
