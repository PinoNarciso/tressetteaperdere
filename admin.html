<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Torneo Tressette</title>
<style>
body{font-family:Segoe UI;background:#f0f2f5;padding:30px;display:flex;flex-direction:column;align-items:center;}
.card{background:white;padding:20px;border-radius:10px;width:420px;box-shadow:0 4px 10px rgba(0,0,0,0.1);margin-bottom:20px;}
input{width:100%;padding:8px;margin-bottom:10px;}
button{width:100%;padding:10px;background:#27ae60;color:white;border:none;border-radius:6px;cursor:pointer;}
</style>
</head>
<body>

<div class="card" id="login">
<h3>Accesso amministratore</h3>
<input type="password" id="adminPass" placeholder="Password">
<button onclick="login()">Accedi</button>
</div>

<div class="card" id="adminPanel" style="display:none">
<h3>Crea Tavolo</h3>
<input id="name" placeholder="Nome Tavolo">
<input id="players" placeholder="Giocatori (Mario,Luca,Anna)">
<input id="limit" type="number" value="81">
<input id="winners" type="number" value="3">
<input id="password" placeholder="Password tavolo">
<button onclick="createTable()">Crea Tavolo</button>
</div>

<div class="card">
<h3>Tavoli creati</h3>
<div id="tables"></div>
</div>

<script>
const ADMIN_PASSWORD="admin123";

function login(){
  const p=document.getElementById("adminPass").value;
  if(p===ADMIN_PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    loadTables();
  }else alert("Password errata");
}

// salva tavoli in localStorage
function createTable(){
  const name=document.getElementById("name").value;
  if(!name){ alert("Inserisci nome tavolo"); return; }

  const table={
    name:name,
    players:document.getElementById("players").value,
    limit:Number(document.getElementById("limit").value),
    winners:Number(document.getElementById("winners").value),
    password:document.getElementById("password").value,
    editor:null
  };

  let tables=JSON.parse(localStorage.getItem("tables")||"[]");
  tables.push(table);
  localStorage.setItem("tables",JSON.stringify(tables));

  loadTables();
}

function loadTables(){
  const tables=JSON.parse(localStorage.getItem("tables")||"[]");
  const div=document.getElementById("tables");
  div.innerHTML="";
  tables.forEach((t,i)=>{ div.innerHTML+=`<p><b>${t.name}</b> - ${t.players}</p>`; });
}
</script>

</body>
</html>
