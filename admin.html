
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Tressette</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="firebase.js"></script>

</head>

<body>

<div class="card">

<h2>Crea Tavolo</h2>

<input id="name" placeholder="Nome tavolo">
<input id="players" placeholder="Mario,Luca,Anna">
<input id="limit" type="number" value="81">
<input id="winners" type="number" value="3">

<button onclick="create()">Crea Tavolo</button>

<div id="qr"></div>

</div>

<div class="card">

<h3>Tavoli attivi</h3>
<div id="tables"></div>

</div>

<script>

function create(){

const id="table_"+Date.now()

db.ref("tables/"+id).set({

name:document.getElementById("name").value,
players:document.getElementById("players").value,
limit:Number(document.getElementById("limit").value),
winners:Number(document.getElementById("winners").value)

})

const link=location.origin + location.pathname.replace("admin.html","") + "gioco.html?table=" + id

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),link)

}

db.ref("tables").on("value",snap=>{

const tables=snap.val() || {}

const div=document.getElementById("tables")

div.innerHTML=""

for(let id in tables){

const t=tables[id]

div.innerHTML+=`
<div class="tableBox">
<b>${t.name}</b>
<button onclick="removeTable('${id}')">Elimina</button>
</div>
`

}

})

function removeTable(id){

if(confirm("Eliminare tavolo?")){

db.ref("tables/"+id).remove()

}

}

</script>

</body>
</html>
